<!DOCTYPE html>
<html>
<head>

<title>Eirini Feedback Form</title>

<style>
  .rating {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
}

.rating input[type="radio"] {
    display: none;
}

.rating label {
    width: 40px;
    height: 40px;
    border: 1px solid #ccc;
    border-radius: 6px;
    text-align: center;
    line-height: 40px;
    cursor: pointer;
    margin: 0;
}

.rating input[type="radio"]:checked + label {
    background: #007bff;
    color: white;
    border-color: #007bff;
}
body{
    font-family:Arial,sans-serif;
    max-width:600px;
    margin:40px auto;
    padding:20px;
}

label{
    display:block;
    margin-top:20px;
    font-weight:bold;
}

select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
}

button{
    margin-top:20px;
    padding:12px 20px;
}
</style>

</head>
